name: iOS CI/CD - DigiHunt Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Distribute DigiHunt iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.3'

      - name: Install CocoaPods if Podfile exists
        run: |
          brew install cocoapods || true
          if [ -f Podfile ]; then
            echo " Podfile found. Installing..."
            pod install
          else
            echo " No Podfile found. Skipping pod install."
          fi

      - name: Build and test
        run: |
          xcodebuild clean test \
            -workspace DigiHunt.xcodeproj \
            -scheme DigiHunt \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0'

      - name: Archive app
        run: |
          xcodebuild clean archive \
            -workspace DigiHunt.xcworkspace \
            -scheme DigiHunt \
            -archivePath ${{ github.workspace }}/build/DigiHunt.xcarchive \
            -destination 'generic/platform=iOS'

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ github.workspace }}/build/DigiHunt.xcarchive \
            -exportPath ${{ github.workspace }}/build \
            -exportOptionsPlist ExportOptions.plist

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          file: build/DigiHunt.ipa
          groups: beta-testers
          releaseNotes: "Automated build from GitHub Actions 🚀"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigiHunt.ipa
          path: build/DigiHunt.ipa
